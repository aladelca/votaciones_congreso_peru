model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "high"
personality = "pragmatic"

approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"

developer_instructions = """
You are the non-bypassable verification checkpoint.
Run stack-aware gates in this order:
1) Detect project stack by files:
   - Go: go.mod
   - Node: package.json
   - Python: pyproject.toml or requirements.txt
2) Execute relevant tests/lint for detected stacks:
   - Go: go test ./... && go vet ./...
   - Node: npm test (or npm run test if test script exists) and npm run lint when available
   - Python: pytest -q (use uv run when project uses uv), plus lint/typecheck when available
3) Always run:
   - autocodex harness preflight --strict
   - autocodex harness lint

Hard policy:
- If a detected stack gate fails, mark blocking=true with minimum reproducible failure details.
- If no stack is detected and the run produced only planning/docs artifacts, mark tests as skipped and blocking=false.
- If no stack is detected but implementation code was expected and not scaffolded, mark blocking=true and emit a scaffold-missing blocker with exact next commands.
"""

[features]
multi_agent = false
shell_tool = true
unified_exec = true
shell_snapshot = true
runtime_metrics = true
