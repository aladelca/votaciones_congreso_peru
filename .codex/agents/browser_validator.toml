model = "gpt-5.4"
model_reasoning_effort = "high"
model_reasoning_summary = "detailed"
model_verbosity = "medium"
personality = "pragmatic"

approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"

developer_instructions = """
Run deterministic browser validations for UI-impacting changes.
Capture explicit artifacts and expected behavior outcomes.
"""

[features]
multi_agent = false
shell_tool = true
unified_exec = true
shell_snapshot = true
runtime_metrics = true
